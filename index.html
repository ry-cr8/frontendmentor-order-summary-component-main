<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Order summary card</title>
  </head>
  <body>
    <main>
      <div class="order-summary-card">
        <img
          src="images/illustration-hero.svg"
          alt="illuustration hero image"
          class="hero-image"
        />
        <h2>Order Summary</h2>
        <p class="text-descri">
          You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!
        </p>

        <div class="plan-container">
          <img src="images/icon-music.svg" alt="music icon" />

          <div class="plan-details">
            <h5 class="plan-duration">Annual Plan</h5>
            <h5 class="plan-price">$59.99/year</h5>
          </div>
          <span class="change-button"><a href="#">Change</a></span>
        </div>

        <div class="button-container">
          <button class="proceed-btn">Proceed to Payment</button>
          <button class="cancel-btn">Cancel Order</button>
        </div>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/ry-cr8">ry-cr8</a>.
    </footer>
  </body>
</html>
